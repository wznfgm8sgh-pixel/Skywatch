# Skywatch — TrueNAS custom app (Docker Compose)
#
# Install via:  Apps → Discover → three-dot menu → Install via YAML
#
# Fill in the environment values for your own setup before pasting.
# Two deployment methods are shown below; only one service block should
# be active at a time.
#
# ─────────────────────────────────────────────────────────────────────
# METHOD B — Pre-built GHCR image (active default)
#
# GitHub Actions builds the image on every push to main and publishes
# it to GHCR.  TrueNAS pulls the pre-built image — no files are
# downloaded at runtime.  Works with a private repo.
#
# One-time setup after first merge to main:
#   1. Go to github.com/<you>/Skywatch/packages
#   2. Set the skywatch package to Public
#   3. Paste this YAML into TrueNAS and start the app.
# ─────────────────────────────────────────────────────────────────────
name: skywatch
services:
  skywatch:
    image: ghcr.io/wznfgm8sgh-pixel/skywatch:latest
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      ADSB_HOST: "192.168.1.x"        # IP of your Pi / decoder host
      ADSB_SBS_PORT: "30003"
      RECEIVER_LAT: "0.000"           # Antenna latitude  (decimal degrees)
      RECEIVER_LON: "0.000"           # Antenna longitude (decimal degrees)
      RECEIVER_NAME: "My Station"     # Short location label
      SITE_NAME: "Skywatch"           # Page heading
      SITE_TAGLINE: "Live ADS-B"      # Sub-heading

