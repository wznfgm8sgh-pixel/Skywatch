# Skywatch — TrueNAS custom app (Docker Compose)
#
# Install via:  Apps → Discover → three-dot menu → Install via YAML
#
# Fill in the environment values for your own setup before pasting.
# Two deployment methods are shown below; only one service block should
# be active at a time.
#
# ─────────────────────────────────────────────────────────────────────
# METHOD A — Raw-fetch (no image build required, active default)
#
# On each container start the bootstrap command downloads bridge.py and
# skywatch.html from the public GitHub repo and then runs the bridge.
# To pick up a code change: edit on GitHub → Restart the app.
# Note: requires the GitHub repo to remain public.
# ─────────────────────────────────────────────────────────────────────
name: skywatch
services:
  skywatch:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app
    command:
      - python3
      - -c
      - |
        import urllib.request, runpy, os
        os.makedirs("/app", exist_ok=True)
        base = "https://raw.githubusercontent.com/wznfgm8sgh-pixel/Skywatch/main/"
        for f in ("bridge.py", "skywatch.html"):
            urllib.request.urlretrieve(base + f, "/app/" + f)
        runpy.run_path("/app/bridge.py", run_name="__main__")
    ports:
      - "8088:8088"
    environment:
      ADSB_HOST: "192.168.1.x"        # IP of your Pi / decoder host
      ADSB_SBS_PORT: "30003"
      RECEIVER_LAT: "0.000"           # Antenna latitude  (decimal degrees)
      RECEIVER_LON: "0.000"           # Antenna longitude (decimal degrees)
      RECEIVER_NAME: "My Station"     # Short location label
      SITE_NAME: "Skywatch"           # Page heading
      SITE_TAGLINE: "Live ADS-B"      # Sub-heading

# ─────────────────────────────────────────────────────────────────────
# METHOD B — Pre-built GHCR image (cleaner; works with a private repo)
#
# Requires GitHub Actions to have run at least once.  After the first
# build, go to the repo Packages page and set the package to Public
# (or configure TrueNAS with a registry credential if you keep it
# private).  Then swap this block in place of Method A above.
# ─────────────────────────────────────────────────────────────────────
# name: skywatch
# services:
#   skywatch:
#     image: ghcr.io/wznfgm8sgh-pixel/skywatch:latest
#     restart: unless-stopped
#     ports:
#       - "8088:8088"
#     environment:
#       ADSB_HOST: "192.168.1.x"
#       ADSB_SBS_PORT: "30003"
#       RECEIVER_LAT: "0.000"
#       RECEIVER_LON: "0.000"
#       RECEIVER_NAME: "My Station"
#       SITE_NAME: "Skywatch"
#       SITE_TAGLINE: "Live ADS-B"
